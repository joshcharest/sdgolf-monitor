<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sdgolf · tee time monitor</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,0..100;1,9..144,400..700,0..100&family=JetBrains+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <button type="button" id="brand-link" class="brand">
      <svg class="brand-mark" viewBox="0 0 24 32" width="22" height="30" aria-hidden="true">
        <path d="M6 30 V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" />
        <path d="M6 3.5 L21 7.5 L6 12 Z" fill="currentColor" />
        <ellipse cx="6" cy="30" rx="3.5" ry="1" fill="currentColor" opacity="0.6" />
      </svg>
      <div class="brand-text">
        <h1>sdgolf <em>·</em> tee time monitor</h1>
        <p class="brand-sub">San Diego city courses · live availability</p>
      </div>
    </button>
    <nav>
      <button id="new-btn" type="button" hidden>New subscription</button>
      <button id="away-btn" type="button" hidden title="Dates I'm away — no alerts">Away</button>
      <button id="help-btn" type="button" hidden title="Walk through the app features">?</button>
      <button id="admin-btn" type="button" hidden>Admin</button>
      <span id="user-badge" class="user-badge" hidden></span>
      <button id="signout-btn" type="button" hidden>Sign out</button>
    </nav>
  </header>

  <main id="root">
    <!-- views are rendered into here -->
    <p class="loading">Loading…</p>
  </main>

  <template id="auth-view">
    <section class="card auth">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Log in</button>
        <button type="button" class="auth-tab" data-tab="signup">Sign up</button>
      </div>

      <form id="login-form" class="auth-form">
        <label>Email
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label>Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="primary">Log in</button>
      </form>

      <form id="signup-form" class="auth-form" hidden>
        <p class="hint">You can only sign up with an email the admin has added to the allow list. Ask whoever shared this URL if your email isn't accepted.</p>
        <label>Email
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <label>Password <small>(at least 8 characters)</small>
          <input type="password" name="password" autocomplete="new-password" minlength="8" required />
        </label>
        <button type="submit" class="primary">Create account</button>
      </form>

      <p class="error" id="auth-error" hidden></p>
    </section>
  </template>

  <template id="list-view">
    <section id="list-section">
      <section id="bookings-section" hidden>
        <h2 class="bookings-title">Your bookings <span class="bookings-count"></span></h2>
        <ul class="bookings-list"></ul>
      </section>
      <div class="list-tabs">
        <button type="button" class="list-tab active" data-filter="mine">My subscriptions</button>
        <button type="button" class="list-tab" data-filter="others">Other subscriptions</button>
      </div>
      <div class="cards" id="cards"></div>
      <p class="hint" id="cards-empty" hidden></p>
      <p class="snapshot-meta" id="snapshot-meta"></p>
    </section>
  </template>

  <template id="card">
    <article class="card check-card">
      <header>
        <h3 class="card-name"></h3>
        <span class="card-autobook-badge" hidden title="This subscription will auto-book matching slots">auto-book</span>
        <span class="card-matches-summary"></span>
        <button type="button" class="edit-btn" hidden>Edit</button>
        <button type="button" class="subscribe-btn" hidden></button>
        <div class="card-mode" hidden role="group" aria-label="Subscription mode">
          <button type="button" class="seg" data-mode="off">Off</button>
          <button type="button" class="seg" data-mode="alert">Alert</button>
          <button type="button" class="seg seg-auto" data-mode="auto" hidden title="Auto-book the first matching slot (dry run)">Auto</button>
        </div>
      </header>
      <p class="card-owner"></p>
      <ul class="card-meta">
        <li class="card-targets"></li>
        <li class="card-dates"></li>
        <li class="card-filter"></li>
      </ul>
      <div class="card-matches" hidden>
        <ul class="card-matches-list"></ul>
      </div>
    </article>
  </template>

  <template id="edit-view">
    <section class="card edit">
      <h2 id="edit-title"></h2>
      <form id="edit-form">
        <label>
          Name
          <input type="text" name="name" pattern="[^/\\:*?&quot;&lt;&gt;|]+" required />
        </label>
        <label class="inline">
          <input type="checkbox" name="enabled" checked />
          Enabled
        </label>

        <fieldset id="courses-fs">
          <legend>Courses</legend>
          <div id="courses-grid"></div>
        </fieldset>

        <fieldset id="dates-fs">
          <legend>Date range</legend>
          <div class="date-input-row">
            <span class="date-label">Start</span>
            <select name="date-start-mode" class="date-mode">
              <option value="relative">Relative</option>
              <option value="specific">Specific date</option>
            </select>
            <input type="text" name="date-start-relative" class="date-relative" placeholder="today or today+30" />
            <input type="date" name="date-start-specific" class="date-specific" hidden />
          </div>
          <div class="date-input-row">
            <span class="date-label">End</span>
            <select name="date-end-mode" class="date-mode">
              <option value="relative">Relative</option>
              <option value="specific">Specific date</option>
            </select>
            <input type="text" name="date-end-relative" class="date-relative" placeholder="today+90" />
            <input type="date" name="date-end-specific" class="date-specific" hidden />
          </div>
          <p class="hint">Relative accepts <code>today</code> or <code>today+N</code>.</p>
        </fieldset>

        <fieldset id="filter-fs">
          <legend>Filter</legend>
          <div class="row">
            <label class="inline">
              Holes
              <select name="holes">
                <option value="18" selected>18</option>
                <option value="9">9</option>
                <option value="both">Both</option>
              </select>
            </label>
            <label class="inline">
              Min players
              <select name="min-players">
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </label>
          </div>
        </fieldset>

        <fieldset id="windows-fs">
          <legend>Time windows <small>(any window may match)</small></legend>
          <div id="windows-list"></div>
          <button type="button" id="add-window">＋ Add window</button>
          <p class="hint">Days of the week filter within the date range.</p>
        </fieldset>

        <fieldset id="autobook-fieldset" hidden>
          <legend>Auto-book <small>(admin)</small></legend>
          <label class="inline">
            <input type="checkbox" name="autobook-enabled" />
            Automatically book the first matching slot
          </label>
          <p class="hint">Books on the runner's shared ForeUp account (currently dry-run only — you'll get an email with the slot it would have booked). Capped at 1 attempt per day across all subscriptions.</p>
        </fieldset>

        <footer class="edit-footer">
          <button type="submit" class="primary">Save</button>
          <button type="button" id="cancel-btn">Cancel</button>
          <button type="button" id="delete-btn" class="danger" hidden>Delete</button>
        </footer>
      </form>
      <p class="error" id="edit-error" hidden></p>
    </section>
  </template>

  <template id="admin-view">
    <section class="card edit">
      <button type="button" id="admin-back" class="back-link">← Back to subscriptions</button>

      <h2>Allowed users</h2>
      <p class="hint">Only emails on this list can create accounts. <strong>Account</strong> means they've signed up and set a password. Reset deletes the account so they sign up again; Remove drops them from the allowlist and signs them out.</p>

      <form id="admin-add-form" class="admin-add">
        <input type="email" name="email" placeholder="alice@example.com" autocomplete="off" required />
        <button type="submit" class="primary">Add</button>
      </form>

      <ul id="admin-users-list" class="admin-users"></ul>
      <p class="hint" id="admin-users-empty" hidden>No allowed users yet.</p>
      <p class="error" id="admin-error" hidden></p>
    </section>
  </template>

  <template id="course-option">
    <label class="course-option">
      <input type="checkbox" name="course" />
      <span class="course-label"></span>
    </label>
  </template>

  <template id="window-row">
    <div class="window-row">
      <input type="time" class="w-start" required />
      <span>→</span>
      <input type="time" class="w-end" required />
      <div class="weekdays">
        <label><input type="checkbox" value="mon" />Mon</label>
        <label><input type="checkbox" value="tue" />Tue</label>
        <label><input type="checkbox" value="wed" />Wed</label>
        <label><input type="checkbox" value="thu" />Thu</label>
        <label><input type="checkbox" value="fri" />Fri</label>
        <label><input type="checkbox" value="sat" />Sat</label>
        <label><input type="checkbox" value="sun" />Sun</label>
      </div>
      <button type="button" class="w-cal" title="Pick specific dates to include or exclude" aria-label="Pick specific dates">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span class="w-cal-count"></span>
      </button>
      <button type="button" class="w-del" title="Remove window">✕</button>
    </div>
  </template>

  <button type="button" id="bug-fab" hidden title="Report a bug">!</button>

  <template id="bug-modal">
    <div class="modal-backdrop">
      <section class="card modal">
        <h2>Report a bug</h2>
        <p class="hint">Describe what you were doing and what went wrong. We'll include your email, current view, and recent client errors automatically.</p>
        <form id="bug-form">
          <label>
            What happened?
            <textarea name="description" rows="6" required placeholder="I clicked Save and nothing happened…"></textarea>
          </label>
          <footer class="edit-footer">
            <button type="submit" class="primary">Send</button>
            <button type="button" id="bug-cancel">Cancel</button>
          </footer>
        </form>
        <p class="error" id="bug-error" hidden></p>
      </section>
    </div>
  </template>

  <div id="toast" hidden></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
