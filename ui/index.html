<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sdgolf · tee time monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,0..100;1,9..144,400..700,0..100&family=JetBrains+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 32" width="22" height="30" aria-hidden="true">
        <path d="M6 30 V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" />
        <path d="M6 3.5 L21 7.5 L6 12 Z" fill="currentColor" />
        <ellipse cx="6" cy="30" rx="3.5" ry="1" fill="currentColor" opacity="0.6" />
      </svg>
      <div class="brand-text">
        <h1>sdgolf <em>·</em> tee time monitor</h1>
        <p class="brand-sub">San Diego city courses · live availability</p>
      </div>
    </div>
    <nav>
      <button id="new-btn" type="button" hidden>New check set</button>
      <button id="signout-btn" type="button" hidden>Sign out</button>
    </nav>
  </header>

  <main id="root">
    <!-- views are rendered into here -->
    <p class="loading">Loading…</p>
  </main>

  <template id="auth-view">
    <section class="card auth">
      <h2>One-time setup</h2>
      <p>
        This page reads and writes
        <code>configs/*.yaml</code> in
        <a href="https://github.com/joshcharest/sdgolf-monitor" target="_blank" rel="noopener">joshcharest/sdgolf-monitor</a>
        directly through the GitHub REST API. Paste a fine-grained personal
        access token below. It's stored in this browser's localStorage and
        never sent anywhere except <code>api.github.com</code>.
      </p>
      <ol>
        <li>
          Visit
          <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">
            github.com/settings/personal-access-tokens/new
          </a>
        </li>
        <li>Resource owner: <strong>joshcharest</strong>. Repository access: only <strong>sdgolf-monitor</strong>.</li>
        <li>Repository permissions: <strong>Contents → Read &amp; write</strong>. Nothing else.</li>
        <li>Generate, copy the <code>github_pat_…</code> token, paste here.</li>
      </ol>
      <form id="auth-form">
        <input type="password" id="pat-input" placeholder="github_pat_…" autocomplete="off" required />
        <button type="submit">Save token</button>
      </form>
      <p class="error" id="auth-error" hidden></p>
    </section>
  </template>

  <template id="list-view">
    <section id="list-section">
      <div class="cards" id="cards"></div>
      <p class="hint" id="cards-empty" hidden>No check sets yet — click "＋ New check set" to create one.</p>
      <p class="snapshot-meta" id="snapshot-meta"></p>
    </section>
  </template>

  <template id="card">
    <article class="card check-card">
      <header>
        <h3 class="card-name"></h3>
        <span class="card-matches-summary"></span>
        <button type="button" class="edit-btn">Edit</button>
        <label class="toggle">
          <input type="checkbox" class="enabled-toggle" />
          <span></span>
        </label>
      </header>
      <p class="card-desc"></p>
      <ul class="card-meta">
        <li class="card-targets"></li>
        <li class="card-dates"></li>
        <li class="card-filter"></li>
      </ul>
      <div class="card-matches" hidden>
        <ul class="card-matches-list"></ul>
      </div>
    </article>
  </template>

  <template id="edit-view">
    <section class="card edit">
      <h2 id="edit-title"></h2>
      <form id="edit-form">
        <label>
          Name
          <input type="text" name="name" pattern="[^/\\:*?&quot;&lt;&gt;|]+" required />
        </label>
        <label class="inline">
          <input type="checkbox" name="enabled" checked />
          Enabled
        </label>

        <fieldset>
          <legend>Courses</legend>
          <div id="courses-grid"></div>
          <div class="row booking-class-row">
            <label class="inline">
              Booking class
              <select id="booking-class" name="booking-class"></select>
            </label>
            <input type="number" id="booking-class-custom" placeholder="custom id" hidden />
          </div>
        </fieldset>

        <fieldset>
          <legend>Date range</legend>
          <div class="date-input-row">
            <span class="date-label">Start</span>
            <select name="date-start-mode" class="date-mode">
              <option value="relative">Relative</option>
              <option value="specific">Specific date</option>
            </select>
            <input type="text" name="date-start-relative" class="date-relative" placeholder="today or today+30" />
            <input type="date" name="date-start-specific" class="date-specific" hidden />
          </div>
          <div class="date-input-row">
            <span class="date-label">End</span>
            <select name="date-end-mode" class="date-mode">
              <option value="relative">Relative</option>
              <option value="specific">Specific date</option>
            </select>
            <input type="text" name="date-end-relative" class="date-relative" placeholder="today+90" />
            <input type="date" name="date-end-specific" class="date-specific" hidden />
          </div>
          <p class="hint">Relative accepts <code>today</code>, <code>today+N</code>, <code>today-N</code>. Specific date uses your browser's calendar picker.</p>
        </fieldset>

        <fieldset>
          <legend>Filter</legend>
          <div class="row">
            <label class="inline">
              Holes
              <select name="holes">
                <option value="18" selected>18</option>
                <option value="9">9</option>
                <option value="both">Both</option>
              </select>
            </label>
            <label class="inline">
              Min players
              <input type="number" name="min-players" min="1" max="4" value="2" />
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Time windows <small>(any window may match)</small></legend>
          <div id="windows-list"></div>
          <button type="button" id="add-window">＋ Add window</button>
          <p class="hint">Weekdays AND with the date range. If start &amp; end are the same specific date, leave weekdays empty unless you want a second guard.</p>
        </fieldset>

        <footer class="edit-footer">
          <button type="submit" class="primary">Save</button>
          <button type="button" id="cancel-btn">Cancel</button>
          <button type="button" id="delete-btn" class="danger" hidden>Delete</button>
        </footer>
      </form>
      <p class="error" id="edit-error" hidden></p>
    </section>
  </template>

  <template id="course-option">
    <label class="course-option">
      <input type="checkbox" name="course" />
      <span class="course-label"></span>
    </label>
  </template>

  <template id="window-row">
    <div class="window-row">
      <input type="time" class="w-start" required />
      <span>→</span>
      <input type="time" class="w-end" required />
      <div class="weekdays">
        <label><input type="checkbox" value="mon" />Mon</label>
        <label><input type="checkbox" value="tue" />Tue</label>
        <label><input type="checkbox" value="wed" />Wed</label>
        <label><input type="checkbox" value="thu" />Thu</label>
        <label><input type="checkbox" value="fri" />Fri</label>
        <label><input type="checkbox" value="sat" />Sat</label>
        <label><input type="checkbox" value="sun" />Sun</label>
      </div>
      <button type="button" class="w-del" title="Remove window">✕</button>
    </div>
  </template>

  <div id="toast" hidden></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
