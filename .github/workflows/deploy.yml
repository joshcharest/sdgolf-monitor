name: deploy

# Manually-triggered Cloudflare Worker deploy (worker.js + ui/ assets via
# wrangler.jsonc). Reuses the CF_API_TOKEN/CF_ACCOUNT_ID secrets the monitor
# workflow already uses for KV snapshot writes; the token additionally needs
# the "Workers Scripts: Edit" permission for this workflow to succeed.
# Wrangler secrets (RUNNER_SECRET, TWILIO_*) live in Cloudflare and are
# untouched by deploys.
on:
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler@4 deploy
