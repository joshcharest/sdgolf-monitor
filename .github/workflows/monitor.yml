name: monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch: {}     # manual trigger from the Actions tab

concurrency:
  group: monitor
  cancel-in-progress: false  # don't kill a run mid-flight; queue the next one

permissions:
  contents: write   # needed to commit state/ updates back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e .

      - name: Run monitor
        env:
          SDGOLF_USERNAME: ${{ secrets.SDGOLF_USERNAME }}
          SDGOLF_PASSWORD: ${{ secrets.SDGOLF_PASSWORD }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python -m sdgolf_monitor.main

      - name: Commit updated state
        run: |
          if [ -z "$(git status --porcelain state)" ]; then
            echo "state unchanged"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          git commit -m "state: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
