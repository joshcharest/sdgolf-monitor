name: monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch: {}     # manual trigger from the Actions tab

concurrency:
  group: monitor
  cancel-in-progress: false  # don't kill a run mid-flight; queue the next one

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e .

      # Dedup state lives in the Actions cache, not the repo. Unique key per
      # run forces a save every time; restore-keys falls back to the most
      # recent prior state-* cache.
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state
          key: state-${{ github.run_id }}
          restore-keys: |
            state-

      - name: Run monitor
        env:
          SDGOLF_USERNAME: ${{ secrets.SDGOLF_USERNAME }}
          SDGOLF_PASSWORD: ${{ secrets.SDGOLF_PASSWORD }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python -m sdgolf_monitor.main --snapshot-path snapshot.json

      - name: Save state cache
        if: always() && hashFiles('state/**') != ''
        uses: actions/cache/save@v4
        with:
          path: state
          key: state-${{ github.run_id }}

      # Publish a snapshot of current matches to Cloudflare KV so the UI
      # can show live tee times without ever calling ForeUp from the
      # browser. Skipped silently if CF secrets aren't configured yet.
      - name: Publish snapshot to Cloudflare KV
        if: always() && hashFiles('snapshot.json') != '' && env.CF_API_TOKEN != ''
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsS -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/snapshot" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @snapshot.json > /dev/null
          echo "snapshot uploaded ($(wc -c < snapshot.json) bytes)"

      # Guardrail: a run can finish with exit 0 even when every check set
      # crashed, because main.py catches per-set exceptions. Inspect the
      # snapshot and fail the job if every enabled set has an error, so
      # total breakage produces a red X (and the usual Actions failure email)
      # instead of a silent green tick.
      - name: Fail if every enabled set errored
        if: always() && hashFiles('snapshot.json') != ''
        run: |
          python <<'PY'
          import json, sys
          sets = json.load(open("snapshot.json")).get("sets", {})
          enabled = {n: s for n, s in sets.items() if s.get("enabled", True)}
          if not enabled:
              print("no enabled check sets; nothing to guard")
              sys.exit(0)
          errored = [n for n, s in enabled.items() if "error" in s]
          if len(errored) == len(enabled):
              print(f"all {len(enabled)} enabled set(s) errored: {errored}")
              sys.exit(1)
          print(f"{len(enabled) - len(errored)}/{len(enabled)} enabled set(s) ok")
          PY
