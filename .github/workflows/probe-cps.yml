# One-off diagnostic: does GitHub's runner IP get past Cloudflare on CPS.golf
# (Encinitas Ranch)? The tee-time API sits behind a Cloudflare "managed
# challenge" that blocks headless clients from datacenter IPs. This probe
# curls the endpoints FROM the runner and prints the cf-mitigated header so
# we can tell — before writing any provider code — whether a plain requests
# client would be challenged here too. Delete this workflow once answered.
name: probe-cps

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe CPS.golf from the runner
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
          probe() {
            # $1 = label, $2 = url, rest = extra curl args
            local label="$1" url="$2"; shift 2
            local out
            out=$(curl -sS -o /dev/null \
              -w '%{http_code} cf-mitigated:[%header{cf-mitigated}] server:%header{server}' \
              -A "$UA" \
              -H 'Accept: application/json, text/plain, */*' \
              -H 'Accept-Language: en-US,en;q=0.9' \
              --max-time 20 "$@" "$url" 2>&1) || out="curl-error: $out"
            printf '  %-38s %s\n' "$label" "$out"
          }
          key='8ea2914e-cac2-48a7-a3e5-e0f41350bf3a'
          for T in jcgsc5 jcplayer5; do
            echo "=== $T.cps.golf ==="
            jar="$(mktemp)"
            probe "warm-up search-teetime (HTML)" \
              "https://$T.cps.golf/onlineresweb/search-teetime" \
              -c "$jar" -b "$jar" -H "Referer: https://$T.cps.golf/"
            probe "Home/Configuration" \
              "https://$T.cps.golf/onlineresweb/Home/Configuration" \
              -c "$jar" -b "$jar" -H "Referer: https://$T.cps.golf/onlineresweb/search-teetime"
            probe "GetAllOptions/$T (api)" \
              "https://$T.cps.golf/onlineres/onlineapi/api/v1/onlinereservation/GetAllOptions/$T?product=3" \
              -c "$jar" -b "$jar" \
              -H "Referer: https://$T.cps.golf/onlineresweb/search-teetime" \
              -H "x-apiKey: $key"
            echo
          done
          echo "Read the cf-mitigated column: empty [] = past Cloudflare (runner is clear);"
          echo "[challenge] = blocked. HTTP 401 with empty cf-mitigated is GOOD (past CF, just needs auth)."
