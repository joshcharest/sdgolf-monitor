# sdgolf-monitor configuration.
#
# `targets` is a list of (course, booking_class) pairs to query each run.
# `dates` is the inclusive YYYY-MM-DD range to scan every pass.
# `filter` is the criteria a tee time must satisfy to trigger an email.
#
# To discover the right booking_class for your account, run:
#   python -m sdgolf_monitor.discover
# (it prints your booking_class_ids and each teesheet's slot count under each class).

targets:
  # Near-term (0-7 days out) — Balboa free booking under the resident program
  - name: Balboa Park 18 (≤7d)
    teesheet_id: 1470
    booking_class: 929
  # Far-term (8-90 days out) — paid resident booking window
  - name: Balboa Park 18 (8-90d)
    teesheet_id: 1470
    booking_class: 51735
  - name: Torrey Pines North
    teesheet_id: 1468
    booking_class: 51735
  - name: Torrey Pines South
    teesheet_id: 1487
    booking_class: 51735

# Sliding window — `today` and `today+N` resolve at run time, so this stays
# fresh without edits. The ForeUp API only exposes ~90 days out for Torrey
# and ~7 days for Balboa under the resident class.
dates:
  start: today
  end: today+90

filter:
  holes: 18
  min_players: 2
  max_green_fee: null   # set to a dollar cap if you want one; null = no cap
  windows:
    # Weekend mornings — prime tee times, the main thing worth waking up to email about
    - start: "06:30"
      end: "11:30"
      weekdays: [sat, sun]
    # Friday afternoon — half-day-friday play
    - start: "13:00"
      end: "17:30"
      weekdays: [fri]
    # Mid-week afternoons (everything fills up Sat anyway)
    - start: "15:00"
      end: "18:30"
      weekdays: [mon, tue, wed, thu]
